<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMS Logistique</title>
  <style>
    :root {
      --blue:#1a73e8;
      --blue-soft:#e8f0fe;
      --green:#2e7d32;
      --bg:#f3f6fb;
      --card:#ffffff;
      --shadow:0 10px 28px rgba(26,115,232,.11);
      --radius:20px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:Segoe UI, Arial, sans-serif;
      background:var(--bg);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card {
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:40px 36px;
      max-width:480px;
      width:100%;
      text-align:center;
      border:1px solid #e8edf6;
    }
    .logo { font-size:48px; margin-bottom:16px; }
    h1 { font-size:26px; color:#1a1a2e; margin-bottom:8px; }
    .sub { color:#666; font-size:15px; margin-bottom:36px; }
    .btn-group { display:flex; flex-direction:column; gap:14px; }
    .btn {
      display:block;
      text-decoration:none;
      border-radius:14px;
      padding:18px 22px;
      font-weight:700;
      font-size:16px;
      transition:.18s;
      cursor:pointer;
      border:none;
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,.12); }
    .btn.blue {
      background:linear-gradient(135deg,#1a73e8,#1557b0);
      color:#fff;
    }
    .btn.green {
      background:linear-gradient(135deg,#2e7d32,#1b5e20);
      color:#fff;
    }
    .btn .icon { font-size:22px; margin-bottom:4px; display:block; }
    .btn .desc { font-size:12px; font-weight:400; opacity:.85; margin-top:4px; }
    footer { margin-top:22px; color:#aaa; font-size:12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📦</div>
    <h1>WMS Logistique</h1>
    <p class="sub">Choisissez votre interface pour commencer</p>

    <div class="btn-group">
      <a href="wms.html" class="btn blue">
        <span class="icon">🖥️</span>
        Interface Formateur
        <div class="desc">Gestion des commandes, articles, QR code</div>
      </a>
      <a href="demande.html" class="btn green">
        <span class="icon">📋</span>
        Interface Employé
        <div class="desc">Préparation et scan des commandes</div>
      </a>
    </div>
  </div>
  <footer>WMS Logistique — Formation ISLLG</footer>
</body>
</html>
